version: 2

updates:
    - package-ecosystem: npm
      directory: /
      target-branch: dev
      schedule:
          interval: weekly
          day: monday
          time: '09:00'
          timezone: Europe/Berlin
      open-pull-requests-limit: 5
      commit-message:
          prefix: chore
          include: scope
    - package-ecosystem: github-actions
      directory: /
      target-branch: dev
      schedule:
          interval: weekly
          day: monday
          time: '09:30'
          timezone: Europe/Berlin
      open-pull-requests-limit: 5
      commit-message:
          prefix: chore
          include: scope
